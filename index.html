<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setting Sail 2026 · Carnival Conquest</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:     #0d2b4e;
      --navy2:    #163a63;
      --blue:     #1a5276;
      --teal:     #1abc9c;
      --gold:     #d4a017;
      --gold2:    #f0c040;
      --white:    #ffffff;
      --offwhite: #f4f8fb;
      --text:     #1c2833;
      --muted:    #566573;
      --border:   #d5e8f5;
      --radius:   12px;
      --shadow:   0 4px 20px rgba(13,43,78,0.10);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--offwhite); color: var(--text); line-height: 1.6; }

    /* ── Ship Banner ───────────────────────────────────── */
    .ship-banner {
      position: relative;
      height: 340px;
      overflow: hidden;
      background: var(--navy);
    }
    .ship-banner img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 60%;
      opacity: .55;
    }
    .ship-banner-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(13,43,78,0.3) 0%, rgba(13,43,78,0.75) 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 40px;
      text-align: center;
      color: white;
    }
    .ship-name-tag {
      background: var(--gold);
      color: var(--navy);
      font-size: .75rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 16px;
      border-radius: 100px;
      margin-bottom: 10px;
    }
    .ship-banner-overlay h1 { font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 900; letter-spacing: -1px; }
    .ship-banner-overlay .subtitle { font-size: 1rem; opacity: .85; margin-top: 6px; }
    .ship-banner-overlay .dates {
      margin-top: 14px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 100px;
      padding: 7px 22px;
      font-size: .9rem;
    }

    /* ── Countdown ─────────────────────────────────────── */
    .countdown-bar {
      background: var(--navy);
      color: white;
      text-align: center;
      padding: 20px 16px 24px;
    }
    .countdown-label { font-size: .8rem; letter-spacing: 2px; text-transform: uppercase; opacity: .6; margin-bottom: 10px; }
    .countdown-units { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
    .countdown-unit { display: flex; flex-direction: column; align-items: center; }
    .countdown-num {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 2rem;
      font-weight: 900;
      line-height: 1;
      min-width: 64px;
      font-variant-numeric: tabular-nums;
    }
    .countdown-unit span { font-size: .7rem; letter-spacing: 1px; text-transform: uppercase; opacity: .55; margin-top: 5px; }
    .countdown-sailed { font-size: 1.2rem; font-weight: 700; color: var(--gold2); padding: 12px 0; }

    /* ── Nav ───────────────────────────────────────────── */
    nav {
      background: var(--navy2);
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: center; gap: 4px;
      padding: 0 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    nav a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      padding: 13px 18px;
      font-size: .88rem;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: color .2s, border-color .2s;
    }
    nav a:hover { color: white; border-bottom-color: var(--gold2); }

    /* ── Sections ──────────────────────────────────────── */
    section { padding: 56px 24px; max-width: 900px; margin: 0 auto; }
    .section-title { font-size: 1.7rem; font-weight: 800; color: var(--navy); margin-bottom: 6px; }
    .section-subtitle { color: var(--muted); margin-bottom: 10px; font-size: .95rem; }
    .divider { width: 48px; height: 4px; background: var(--gold); border-radius: 4px; margin-bottom: 28px; }

    /* ── Day Cards ─────────────────────────────────────── */
    .timeline { display: flex; flex-direction: column; gap: 16px; }
    .day-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow .2s;
    }
    .day-card:hover { box-shadow: 0 6px 28px rgba(13,43,78,0.15); }
    .day-card-header { display: flex; }
    .day-badge {
      background: linear-gradient(180deg, var(--navy) 0%, var(--blue) 100%);
      color: white;
      min-width: 88px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 22px 10px;
      text-align: center; flex-shrink: 0;
    }
    .day-badge .icon { font-size: 1.8rem; margin-bottom: 6px; }
    .day-badge .day-num { font-size: .65rem; text-transform: uppercase; letter-spacing: 1px; opacity: .65; }
    .day-badge .day-n { font-size: 1.8rem; font-weight: 900; line-height: 1; }
    .day-summary { padding: 20px 24px; flex: 1; }
    .day-summary .port-name { font-size: 1.15rem; font-weight: 800; color: var(--navy); }
    .day-label-chip {
      display: inline-block;
      background: #e8f4fd; color: var(--blue);
      font-size: .75rem; font-weight: 700;
      padding: 3px 10px; border-radius: 100px;
      margin: 4px 0 8px; letter-spacing: .3px;
    }
    .day-date { font-size: .83rem; color: var(--muted); margin-bottom: 10px; }
    .day-desc { font-size: .93rem; color: #444; margin-bottom: 12px; line-height: 1.6; }
    .highlights { display: flex; flex-wrap: wrap; gap: 7px; }
    .highlight-chip {
      background: var(--offwhite); border: 1px solid var(--border);
      color: var(--navy2); font-size: .78rem;
      padding: 4px 11px; border-radius: 100px; font-weight: 600;
    }
    .expand-hint {
      display: flex; align-items: center; gap: 6px;
      font-size: .8rem; color: var(--gold); font-weight: 700;
      margin-top: 12px; letter-spacing: .2px;
    }
    .expand-arrow { transition: transform .3s; display: inline-block; }
    .day-card.open .expand-arrow { transform: rotate(180deg); }

    /* ── Expanded Detail ───────────────────────────────── */
    .day-details {
      display: none;
      border-top: 1px solid var(--border);
      padding: 28px 24px 24px;
      background: #fafdff;
    }
    .day-card.open .day-details { display: block; }
    .detail-about {
      font-size: .95rem; color: #3a4a5c; line-height: 1.7;
      margin-bottom: 20px;
    }
    .detail-section-title {
      font-size: .8rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--navy); margin-bottom: 12px;
    }
    .things-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .thing-item {
      display: flex; gap: 12px;
      background: white; border: 1px solid var(--border);
      border-radius: 10px; padding: 13px 16px;
    }
    .thing-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold); flex-shrink: 0; margin-top: 6px;
    }
    .thing-name { font-weight: 700; font-size: .9rem; color: var(--navy); }
    .thing-desc { font-size: .85rem; color: var(--muted); margin-top: 2px; }
    .detail-tip {
      background: #fff8e6; border: 1px solid #f5d080;
      border-radius: 10px; padding: 13px 16px;
      font-size: .88rem; color: #7a5c00; margin-bottom: 14px;
    }
    .detail-tip strong { color: #5a4200; }
    .detail-weather {
      font-size: .85rem; color: var(--muted);
      background: #f0f7ff; border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px;
    }

    /* ── Staterooms ────────────────────────────────────── */
    .stateroom-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
    .stateroom-box {
      background: white; border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow);
    }
    .stateroom-header {
      background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
      color: white; padding: 16px 20px;
    }
    .stateroom-header .sr-num { font-size: 1rem; font-weight: 800; }
    .stateroom-header .sr-code { font-size: .8rem; opacity: .7; margin-top: 2px; }
    .stateroom-header .sr-arrival {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
      border-radius: 100px; padding: 4px 12px;
      font-size: .75rem; margin-top: 10px;
    }
    .stateroom-passengers { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    .passenger-row { display: flex; align-items: center; gap: 12px; }
    .passenger-avatar {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--navy), var(--teal));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 800; font-size: .85rem; flex-shrink: 0;
    }
    .passenger-name { font-weight: 600; font-size: .9rem; color: var(--navy); }

    /* ── Footer ────────────────────────────────────────── */
    footer {
      background: var(--navy); color: rgba(255,255,255,0.5);
      text-align: center; padding: 32px 24px; font-size: .85rem; margin-top: 20px;
    }
    footer strong { color: rgba(255,255,255,0.85); }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 600px) {
      .day-card-header { flex-direction: column; }
      .day-badge { flex-direction: row; gap: 14px; padding: 14px 18px; min-width: unset; }
      .day-badge .icon { margin-bottom: 0; }
      nav a { padding: 11px 10px; font-size: .8rem; }
      .countdown-num { font-size: 1.5rem; min-width: 50px; padding: 8px 12px; }
      section { padding: 36px 16px; }
      .ship-banner { height: 260px; }
    }
  </style>
</head>
<body>

<!-- Ship Banner -->
<header class="ship-banner">
  <img id="ship-img" src="" alt="Carnival Conquest" onerror="this.style.display='none'" />
  <div class="ship-banner-overlay">
    <div class="ship-name-tag" id="ship-name-tag"></div>
    <h1 id="hero-title"></h1>
    <p class="subtitle" id="hero-subtitle"></p>
    <span class="dates" id="hero-dates"></span>
  </div>
</header>

<!-- Countdown -->
<div class="countdown-bar">
  <div class="countdown-label">⚓ Countdown to Departure</div>
  <div class="countdown-units" id="countdown-units">
    <div class="countdown-unit"><div class="countdown-num" id="cd-days">--</div><span>Days</span></div>
    <div class="countdown-unit"><div class="countdown-num" id="cd-hours">--</div><span>Hours</span></div>
    <div class="countdown-unit"><div class="countdown-num" id="cd-mins">--</div><span>Minutes</span></div>
    <div class="countdown-unit"><div class="countdown-num" id="cd-secs">--</div><span>Seconds</span></div>
  </div>
  <div class="countdown-sailed" id="countdown-sailed" style="display:none"></div>
</div>

<!-- Nav -->
<nav>
  <a href="#itinerary">📅 Itinerary</a>
  <a href="#who-coming">👥 Who's Coming</a>
</nav>

<!-- Itinerary -->
<section id="itinerary">
  <div class="section-title">Your Itinerary</div>
  <div class="section-subtitle" id="itinerary-sub"></div>
  <div class="divider"></div>
  <div class="timeline" id="timeline"></div>
</section>

<!-- Who's Coming -->
<section id="who-coming">
  <div class="section-title">Who's Coming</div>
  <p class="section-subtitle">All 12 guests, grouped by stateroom. Arrival appointment: <strong>11:00 – 11:30 AM</strong> on June 8.</p>
  <div class="divider"></div>
  <div class="stateroom-grid" id="stateroom-grid"></div>
</section>

<!-- Footer -->
<footer>
  <p><strong id="footer-title"></strong></p>
  <p style="margin-top:6px" id="footer-ship"></p>
</footer>

<script src="data.js"></script>
<script>
  // ── Populate static content ─────────────────────────────
  document.title = cruiseData.title + " · " + cruiseData.ship;
  document.getElementById("ship-img").src = cruiseData.shipImage;
  document.getElementById("ship-name-tag").textContent = "⚓ " + cruiseData.ship;
  document.getElementById("hero-title").textContent = cruiseData.title;
  document.getElementById("hero-subtitle").textContent = cruiseData.subtitle;
  document.getElementById("hero-dates").textContent = "📅 " + cruiseData.departure + " → " + cruiseData.returnDate;
  document.getElementById("itinerary-sub").textContent = cruiseData.ship + " · " + cruiseData.departure + " – " + cruiseData.returnDate;
  document.getElementById("footer-title").textContent = cruiseData.title;
  document.getElementById("footer-ship").textContent = cruiseData.ship + " · " + cruiseData.departure + " – " + cruiseData.returnDate;

  // ── Countdown ───────────────────────────────────────────
  function updateCountdown() {
    const target = new Date(cruiseData.departureISO).getTime();
    const now = Date.now();
    const diff = target - now;
    if (diff <= 0) {
      document.getElementById("countdown-units").style.display = "none";
      const sailed = document.getElementById("countdown-sailed");
      sailed.style.display = "block";
      sailed.textContent = diff > -5 * 24 * 3600 * 1000
        ? "🚢 We're sailing! Bon voyage!"
        : "🏠 What a trip — welcome home!";
      return;
    }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    document.getElementById("cd-days").textContent  = String(d).padStart(2, "0");
    document.getElementById("cd-hours").textContent = String(h).padStart(2, "0");
    document.getElementById("cd-mins").textContent  = String(m).padStart(2, "0");
    document.getElementById("cd-secs").textContent  = String(s).padStart(2, "0");
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);

  // ── Timeline ────────────────────────────────────────────
  const timeline = document.getElementById("timeline");
  cruiseData.days.forEach(day => {
    const card = document.createElement("div");
    card.className = "day-card";

    const chips = day.highlights.map(h => `<span class="highlight-chip">${h}</span>`).join("");
    const things = day.details.thingsToDo.map(t => `
      <div class="thing-item">
        <div class="thing-dot"></div>
        <div><div class="thing-name">${t.name}</div><div class="thing-desc">${t.desc}</div></div>
      </div>`).join("");

    card.innerHTML = `
      <div class="day-card-header">
        <div class="day-badge">
          <div class="icon">${day.icon}</div>
          <div class="day-num">Day</div>
          <div class="day-n">${day.day}</div>
        </div>
        <div class="day-summary">
          <div class="port-name">${day.port}</div>
          <span class="day-label-chip">${day.label}</span>
          <div class="day-date">📅 ${day.date}</div>
          <div class="day-desc">${day.description}</div>
          <div class="highlights">${chips}</div>
          <div class="expand-hint">Click to explore <span class="expand-arrow">▼</span></div>
        </div>
      </div>
      <div class="day-details">
        <div class="detail-about">${day.details.about}</div>
        <div class="detail-section-title">🗺 Things To Do</div>
        <div class="things-grid">${things}</div>
        <div class="detail-tip"><strong>💡 Tip:</strong> ${day.details.tips}</div>
        <div class="detail-weather">${day.details.weather}</div>
      </div>`;

    card.addEventListener("click", () => card.classList.toggle("open"));
    timeline.appendChild(card);
  });

  // ── Staterooms ──────────────────────────────────────────
  const grid = document.getElementById("stateroom-grid");
  cruiseData.staterooms.forEach((sr, i) => {
    const colors = ["#0d2b4e", "#163a63", "#1a5276"];
    const box = document.createElement("div");
    box.className = "stateroom-box";

    const passengers = sr.passengers.map(name => {
      const initials = name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
      return `<div class="passenger-row">
        <div class="passenger-avatar">${initials}</div>
        <div class="passenger-name">${name}</div>
      </div>`;
    }).join("");

    box.innerHTML = `
      <div class="stateroom-header" style="background: linear-gradient(135deg, ${colors[i]} 0%, #1a5276 100%)">
        <div class="sr-num">${sr.number}</div>
        <div class="sr-code">${sr.code}</div>
        <div class="sr-arrival">⏰ ${sr.arrival}</div>
      </div>
      <div class="stateroom-passengers">${passengers}</div>`;
    grid.appendChild(box);
  });
</script>
</body>
</html>
