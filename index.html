<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Cruise 2026</title>
  <style>
    /* ── Reset & Base ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:   #0d2b4e;
      --navy2:  #163a63;
      --blue:   #1a5276;
      --teal:   #1abc9c;
      --gold:   #d4a017;
      --gold2:  #f0c040;
      --white:  #ffffff;
      --offwhite: #f4f8fb;
      --text:   #1c2833;
      --muted:  #566573;
      --card:   #ffffff;
      --border: #d5e8f5;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(13,43,78,0.10);
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--offwhite);
      color: var(--text);
      line-height: 1.6;
    }

    /* ── Hero ──────────────────────────────────────────── */
    .hero {
      background: linear-gradient(160deg, var(--navy) 0%, var(--blue) 60%, #1f6f9f 100%);
      color: var(--white);
      text-align: center;
      padding: 80px 24px 100px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 60px;
      background: var(--offwhite);
      clip-path: ellipse(55% 100% at 50% 100%);
    }
    .hero-emoji { font-size: 64px; display: block; margin-bottom: 16px; }
    .hero h1 { font-size: clamp(2rem, 5vw, 3.4rem); font-weight: 800; letter-spacing: -1px; }
    .hero .subtitle { font-size: 1.15rem; opacity: .85; margin: 8px 0 20px; }
    .hero .dates {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 100px;
      padding: 8px 24px;
      font-size: .95rem;
      letter-spacing: .5px;
    }
    .wave-decoration {
      position: absolute; bottom: 50px; left: 0; right: 0;
      opacity: .07; font-size: 3rem; letter-spacing: 10px;
      white-space: nowrap; overflow: hidden;
    }

    /* ── Nav ───────────────────────────────────────────── */
    nav {
      background: var(--navy);
      position: sticky; top: 0; z-index: 100;
      display: flex; justify-content: center; gap: 4px;
      padding: 0 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      padding: 14px 18px;
      font-size: .9rem;
      font-weight: 600;
      letter-spacing: .3px;
      border-bottom: 3px solid transparent;
      transition: color .2s, border-color .2s;
    }
    nav a:hover { color: var(--white); border-bottom-color: var(--gold2); }

    /* ── Sections ──────────────────────────────────────── */
    section { padding: 60px 24px; max-width: 900px; margin: 0 auto; }
    .section-title {
      font-size: 1.7rem; font-weight: 800; color: var(--navy);
      margin-bottom: 8px;
    }
    .section-subtitle { color: var(--muted); margin-bottom: 36px; font-size: .95rem; }
    .divider { width: 48px; height: 4px; background: var(--gold); border-radius: 4px; margin: 10px 0 28px; }

    /* ── Day Cards ─────────────────────────────────────── */
    .timeline { display: flex; flex-direction: column; gap: 28px; }
    .day-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
      display: flex;
    }
    .day-badge {
      background: linear-gradient(180deg, var(--navy) 0%, var(--blue) 100%);
      color: var(--white);
      min-width: 90px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px 12px;
      text-align: center;
      flex-shrink: 0;
    }
    .day-badge .icon { font-size: 2rem; margin-bottom: 8px; }
    .day-badge .day-num { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; opacity: .7; }
    .day-badge .day-n { font-size: 2rem; font-weight: 900; line-height: 1; }
    .day-body { padding: 24px 28px; flex: 1; }
    .day-body .port-name { font-size: 1.25rem; font-weight: 800; color: var(--navy); }
    .day-body .day-label {
      display: inline-block;
      background: #e8f4fd; color: var(--blue);
      font-size: .78rem; font-weight: 700;
      padding: 3px 10px; border-radius: 100px;
      margin: 4px 0 10px; letter-spacing: .3px;
    }
    .day-body .day-date { font-size: .85rem; color: var(--muted); margin-bottom: 12px; }
    .day-body .day-desc { font-size: .95rem; color: #444; margin-bottom: 16px; line-height: 1.65; }
    .highlights { display: flex; flex-wrap: wrap; gap: 8px; }
    .highlight-chip {
      background: var(--offwhite);
      border: 1px solid var(--border);
      color: var(--navy2);
      font-size: .8rem;
      padding: 5px 12px;
      border-radius: 100px;
      font-weight: 600;
    }

    /* ── Passengers ────────────────────────────────────── */
    #passengers { background: var(--white); border-radius: var(--radius); padding: 48px 40px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .passenger-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .passenger-card {
      background: var(--offwhite);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .passenger-avatar {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--navy), var(--teal));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 800; font-size: .95rem;
      flex-shrink: 0;
    }
    .passenger-name { font-weight: 700; font-size: .9rem; color: var(--navy); }
    .passenger-cabin { font-size: .78rem; color: var(--muted); margin-top: 2px; }

    /* ── RSVP ──────────────────────────────────────────── */
    #rsvp-section { text-align: center; }
    .rsvp-card {
      background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
      color: white;
      border-radius: var(--radius);
      padding: 48px 40px;
      box-shadow: var(--shadow);
    }
    .rsvp-card h2 { font-size: 1.6rem; margin-bottom: 10px; }
    .rsvp-card p { opacity: .85; margin-bottom: 28px; }
    .rsvp-form { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
    .rsvp-form input, .rsvp-form select, .rsvp-form textarea {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s, background .2s;
    }
    .rsvp-form input::placeholder,
    .rsvp-form textarea::placeholder { color: rgba(255,255,255,0.5); }
    .rsvp-form input:focus, .rsvp-form select:focus, .rsvp-form textarea:focus {
      border-color: var(--gold2);
      background: rgba(255,255,255,0.18);
    }
    .rsvp-form select option { background: var(--navy); }
    .rsvp-btn {
      background: var(--gold);
      color: var(--navy);
      border: none;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 800;
      border-radius: 8px;
      cursor: pointer;
      transition: background .2s, transform .1s;
      letter-spacing: .3px;
    }
    .rsvp-btn:hover { background: var(--gold2); transform: translateY(-1px); }
    .rsvp-success {
      display: none;
      background: rgba(26,188,156,0.2);
      border: 1px solid var(--teal);
      border-radius: 8px;
      padding: 16px;
      color: #a8f0e0;
      font-weight: 600;
      margin-top: 12px;
    }

    /* ── Footer ────────────────────────────────────────── */
    footer {
      background: var(--navy);
      color: rgba(255,255,255,0.55);
      text-align: center;
      padding: 32px 24px;
      font-size: .85rem;
    }
    footer strong { color: rgba(255,255,255,0.85); }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 600px) {
      .day-card { flex-direction: column; }
      .day-badge { flex-direction: row; gap: 16px; padding: 16px 20px; min-width: unset; }
      .day-badge .icon { font-size: 1.5rem; margin-bottom: 0; }
      nav a { padding: 12px 10px; font-size: .8rem; }
      section { padding: 40px 16px; }
      #passengers, .rsvp-card { padding: 32px 20px; }
    }
  </style>
</head>
<body>

<!-- Hero -->
<header class="hero">
  <div class="wave-decoration">🌊 🌊 🌊 🌊 🌊 🌊 🌊 🌊 🌊 🌊 🌊 🌊 🌊 🌊 🌊</div>
  <span class="hero-emoji" id="hero-emoji"></span>
  <h1 id="hero-title"></h1>
  <p class="subtitle" id="hero-subtitle"></p>
  <span class="dates" id="hero-dates"></span>
</header>

<!-- Sticky Nav -->
<nav>
  <a href="#itinerary">📅 Itinerary</a>
  <a href="#who-coming">👥 Who's Coming</a>
  <a href="#rsvp">✋ RSVP</a>
</nav>

<!-- Itinerary -->
<section id="itinerary">
  <div class="section-title">Your Itinerary</div>
  <div class="section-subtitle" id="itinerary-sub"></div>
  <div class="divider"></div>
  <div class="timeline" id="timeline"></div>
</section>

<!-- Passengers -->
<section id="who-coming">
  <div id="passengers">
    <div class="section-title">Who's Coming</div>
    <p class="section-subtitle">Your fellow shipmates for this adventure.</p>
    <div class="divider"></div>
    <div class="passenger-grid" id="passenger-grid"></div>
  </div>
</section>

<!-- RSVP -->
<section id="rsvp" id="rsvp-section">
  <div class="rsvp-card">
    <h2>✋ Confirm Your Spot</h2>
    <p>Let the group know you're in! Fill in your details below.</p>
    <form class="rsvp-form" id="rsvp-form" onsubmit="handleRsvp(event)">
      <input type="text" id="rsvp-name" placeholder="Your full name" required />
      <input type="email" id="rsvp-email" placeholder="Your email address" required />
      <select id="rsvp-status">
        <option value="" disabled selected>Are you confirmed? ✓</option>
        <option value="yes">Yes, I'm in! 🎉</option>
        <option value="maybe">Maybe — checking details</option>
        <option value="no">Can't make it 😢</option>
      </select>
      <textarea id="rsvp-note" placeholder="Any notes, dietary needs, or questions?" rows="3"></textarea>
      <button type="submit" class="rsvp-btn">Submit RSVP →</button>
    </form>
    <div class="rsvp-success" id="rsvp-success">
      ✅ Thanks! Your RSVP has been recorded. See you on the ship!
    </div>
  </div>
</section>

<!-- Footer -->
<footer>
  <p><strong id="footer-title"></strong></p>
  <p style="margin-top:6px" id="footer-ship"></p>
</footer>

<script src="data.js"></script>
<script>
  // ── Populate page from data.js ──────────────────────────
  document.title = cruiseData.title + " · " + cruiseData.ship;
  document.getElementById("page-title").textContent = cruiseData.title;
  document.getElementById("hero-emoji").textContent = cruiseData.heroEmoji;
  document.getElementById("hero-title").textContent = cruiseData.title;
  document.getElementById("hero-subtitle").textContent = cruiseData.subtitle + " · " + cruiseData.ship;
  document.getElementById("hero-dates").textContent = "📅 " + cruiseData.departure + " → " + cruiseData.returnDate;
  document.getElementById("itinerary-sub").textContent =
    cruiseData.ship + " · " + cruiseData.departure + " – " + cruiseData.returnDate;
  document.getElementById("footer-title").textContent = cruiseData.title;
  document.getElementById("footer-ship").textContent = cruiseData.ship + " · " + cruiseData.departure + " – " + cruiseData.returnDate;

  // Timeline
  const timeline = document.getElementById("timeline");
  cruiseData.days.forEach(day => {
    const card = document.createElement("div");
    card.className = "day-card";
    const chips = day.highlights.map(h => `<span class="highlight-chip">${h}</span>`).join("");
    card.innerHTML = `
      <div class="day-badge">
        <div class="icon">${day.icon}</div>
        <div class="day-num">Day</div>
        <div class="day-n">${day.day}</div>
      </div>
      <div class="day-body">
        <div class="port-name">${day.port}</div>
        <span class="day-label">${day.label}</span>
        <div class="day-date">📅 ${day.date}</div>
        <div class="day-desc">${day.description}</div>
        <div class="highlights">${chips}</div>
      </div>`;
    timeline.appendChild(card);
  });

  // Passengers
  const grid = document.getElementById("passenger-grid");
  cruiseData.passengers.forEach(p => {
    const initials = p.name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
    const card = document.createElement("div");
    card.className = "passenger-card";
    card.innerHTML = `
      <div class="passenger-avatar">${initials}</div>
      <div>
        <div class="passenger-name">${p.name}</div>
        ${p.cabin ? `<div class="passenger-cabin">🛏 ${p.cabin}</div>` : ""}
      </div>`;
    grid.appendChild(card);
  });

  // RSVP — stores locally (no backend needed for basic use)
  function handleRsvp(e) {
    e.preventDefault();
    const name   = document.getElementById("rsvp-name").value.trim();
    const email  = document.getElementById("rsvp-email").value.trim();
    const status = document.getElementById("rsvp-status").value || "not specified";
    const note   = document.getElementById("rsvp-note").value.trim();

    // Save to localStorage
    const existing = JSON.parse(localStorage.getItem("cruise_rsvps") || "[]");
    existing.push({ name, email, status, note, submittedAt: new Date().toISOString() });
    localStorage.setItem("cruise_rsvps", JSON.stringify(existing));

    document.getElementById("rsvp-form").style.display = "none";
    document.getElementById("rsvp-success").style.display = "block";
  }
</script>

</body>
</html>
